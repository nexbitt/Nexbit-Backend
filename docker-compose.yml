version: '3.8'

services:
  # Backend principal (monolito existente)
  backend-principal:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexbit-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-}@mysql:3306/sistema_comercial
      - JWT_SECRET=${JWT_SECRET:-mi_clave_secreta_super_segura_2024_remates}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3001
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexbit-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nexbit-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: sistema_comercial
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - nexbit-network

volumes:
  mysql_data:

networks:
  nexbit-network:
    driver: bridge
